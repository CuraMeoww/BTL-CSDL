<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Cửa Hàng Quần Áo - Demo BTL</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f8f9fa; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #e9ecef; padding: 15px; border-radius: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; min-width: 150px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-add { background-color: #28a745; color: white; }
        .btn-add:hover { background-color: #218838; }
        .btn-delete { background-color: #dc3545; color: white; padding: 5px 10px; }
        .btn-delete:hover { background-color: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG QUẢN LÝ CỬA HÀNG QUẦN ÁO</h2>
    
    <!-- Form nhập liệu -->
    <div class="form-group">
        <input type="text" id="tenSP" placeholder="Tên sản phẩm (VD: Áo thun)">
        <input type="number" id="giaBan" placeholder="Giá bán (VNĐ)">
        <input type="text" id="maNCC" placeholder="Mã nhà cung cấp">
        <button class="btn-add" onclick="addProduct()">THÊM MỚI</button>
    </div>

    <!-- Bảng hiển thị -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên Sản Phẩm</th>
                <th>Giá Bán</th>
                <th>Mã NCC</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="productData">
            <!-- Dữ liệu sẽ tự động đổ vào đây -->
        </tbody>
    </table>
</div>

<script>
    // Link API của bạn (Đã bỏ :endpoint)
    const apiURL = 'https://69c3d640b780a9ba03e814bf.mockapi.io/SANPHAM';

    // 1. Hàm Lấy dữ liệu (READ)
    async function loadProducts() {
        const res = await fetch(apiURL);
        const data = await res.json();
        const tbody = document.getElementById('productData');
        tbody.innerHTML = ''; 

        data.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.TenSP}</td>
                    <td>${Number(item.GiaBan).toLocaleString()} VNĐ</td>
                    <td>${item.MaNCC}</td>
                    <td><button class="btn-delete" onclick="deleteProduct('${item.id}')">Xóa</button></td>
                </tr>
            `;
        });
    }

    // 2. Hàm Thêm dữ liệu (CREATE)
    async function addProduct() {
        const ten = document.getElementById('tenSP').value;
        const gia = document.getElementById('giaBan').value;
        const ncc = document.getElementById('maNCC').value;

        if(!ten || !gia) return alert("Vui lòng nhập đủ tên và giá!");

        const newProduct = {
            TenSP: ten,
            GiaBan: gia,
            MaNCC: ncc
        };

        await fetch(apiURL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(newProduct)
        });

        // Xóa form và nạp lại bảng
        document.getElementById('tenSP').value = '';
        document.getElementById('giaBan').value = '';
        document.getElementById('maNCC').value = '';
        loadProducts();
    }

    // 3. Hàm Xóa dữ liệu (DELETE)
    async function deleteProduct(id) {
        if(confirm("Bạn có chắc chắn muốn xóa sản phẩm này?")) {
            await fetch(`${apiURL}/${id}`, { method: 'DELETE' });
            loadProducts();
        }
    }

    // Tự động chạy khi mở web
    loadProducts();
</script>

</body>
</html>
