<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Cửa Hàng Quần Áo - Demo BTL</title>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #34495e; --accent-color: #27ae60; --danger-color: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; margin: 0; padding: 20px; }
       .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); text-transform: uppercase; }
       .nav-buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; }
       .btn-nav { background-color: var(--secondary-color); color: white; }
       .btn-nav.active { background-color: var(--accent-color); }
       .btn-add { background-color: var(--accent-color); color: white; margin-bottom: 15px; }
       .btn-delete { background-color: var(--danger-color); color: white; padding: 5px 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #bdc3c7; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: var(--primary-color); }
       .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
       .modal-content { background: white; margin: 5% auto; padding: 25px; width: 450px; border-radius: 10px; }
       .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quản Lý Cửa Hàng Thời Trang</h1>
    
    <div class="nav-buttons">
        <button class="btn-nav active" onclick="switchTab('nv')">Nhân Viên</button>
        <button class="btn-nav" onclick="switchTab('sp')">Sản Phẩm</button>
        <button class="btn-nav" onclick="switchTab('kh')">Khách Hàng</button>
    </div>

    <div id="section-nv" class="data-section">
        <button class="btn-add" onclick="openModal('nv')">+ Thêm Nhân Viên</button>
        <table id="table-nv">
            <thead>
                <tr><th>Mã NV</th><th>Họ Tên</th><th>Chức Vụ</th><th>SĐT</th><th>Thao Tác</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="section-sp" class="data-section" style="display:none;">
        <button class="btn-add" onclick="openModal('sp')">+ Nhập Sản Phẩm</button>
        <table id="table-sp">
            <thead>
                <tr><th>Mã SP</th><th>Tên Sản Phẩm</th><th>Loại</th><th>Giá Bán</th><th>Thao Tác</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Thêm Dữ Liệu</h2>
        <form id="mainForm">
            <div id="dynamicFields"></div>
            <div style="text-align: right; margin-top: 20px;">
                <button type="button" onclick="closeModal()">Đóng</button>
                <button type="submit" style="background-color: var(--accent-color); color:white;">Xác Nhận</button>
            </div>
        </form>
    </div>
</div>

<script>
// Dữ liệu mẫu khởi tạo dựa trên file SQL 
const defaultData = {
    nv:,
    sp:
};

// Khởi tạo localStorage 
function init() {
    if(!localStorage.getItem('clothing_store_data')) {
        localStorage.setItem('clothing_store_data', JSON.stringify(defaultData));
    }
    renderTable('nv');
}

function getData() {
    return JSON.parse(localStorage.getItem('clothing_store_data'));
}

function saveData(data) {
    localStorage.setItem('clothing_store_data', JSON.stringify(data));
}

function switchTab(tab) {
    document.querySelectorAll('.data-section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
    document.getElementById('section-' + tab).style.display = 'block';
    event.target.classList.add('active');
    renderTable(tab);
}

function renderTable(tab) {
    const data = getData()[tab];
    const tbody = document.querySelector(`#table-${tab} tbody`);
    if(!tbody) return;
    tbody.innerHTML = '';
    
    data.forEach((item, index) => {
        let row = `<tr>`;
        Object.values(item).forEach(val => {
            row += `<td>${typeof val === 'number'? val.toLocaleString() + 'đ' : val}</td>`;
        });
        row += `<td><button class="btn-delete" onclick="deleteItem('${tab}', ${index})">Xóa</button></td></tr>`;
        tbody.innerHTML += row;
    });
}

function openModal(type) {
    const modal = document.getElementById('formModal');
    const fields = document.getElementById('dynamicFields');
    modal.dataset.type = type;
    fields.innerHTML = '';
    
    if(type === 'nv') {
        fields.innerHTML = `
            <div class="form-group"><label>Mã NV</label><input id="inp-id" required></div>
            <div class="form-group"><label>Tên NV</label><input id="inp-name" required></div>
            <div class="form-group"><label>Chức Vụ</label><input id="inp-pos" required></div>
            <div class="form-group"><label>SĐT</label><input id="inp-phone" required></div>
        `;
    } else if(type === 'sp') {
        fields.innerHTML = `
            <div class="form-group"><label>Mã SP</label><input id="inp-id" required></div>
            <div class="form-group"><label>Tên SP</label><input id="inp-name" required></div>
            <div class="form-group"><label>Loại SP</label><input id="inp-cat" required></div>
            <div class="form-group"><label>Giá Bán</label><input type="number" id="inp-price" required></div>
        `;
    }
    modal.style.display = 'block';
}

function closeModal() { document.getElementById('formModal').style.display = 'none'; }

document.getElementById('mainForm').onsubmit = function(e) {
    e.preventDefault();
    const type = document.getElementById('formModal').dataset.type;
    const allData = getData();
    let newItem = {};

    if(type === 'nv') {
        newItem = {
            id: document.getElementById('inp-id').value,
            name: document.getElementById('inp-name').value,
            pos: document.getElementById('inp-pos').value,
            phone: document.getElementById('inp-phone').value
        };
    } else if(type === 'sp') {
        newItem = {
            id: document.getElementById('inp-id').value,
            name: document.getElementById('inp-name').value,
            cat: document.getElementById('inp-cat').value,
            price: parseInt(document.getElementById('inp-price').value)
        };
    }

    // Kiểm tra trùng mã (Constraint) 
    if(allData[type].some(x => x.id === newItem.id)) {
        alert("Lỗi: Mã định danh đã tồn tại!");
        return;
    }

    allData[type].push(newItem);
    saveData(allData);
    closeModal();
    renderTable(type);
};

function deleteItem(type, index) {
    if(confirm('Xác nhận xóa dữ liệu này?')) {
        const allData = getData();
        allData[type].splice(index, 1);
        saveData(allData);
        renderTable(type);
    }
}

// Khởi động hệ thống
init();
</script>
</body>
</html>
