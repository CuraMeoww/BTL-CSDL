<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Đầu Tiên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chào mừng bạn đến với trang web của tôi!</h1>
        <p>Đây là một ví dụ về cấu trúc HTML cơ bản nhất.</p>
        
        <ul>
            <li>Học HTML rất thú vị.</li>
            <li>Bạn có thể thêm CSS để làm đẹp.</li>
            <li>Và thêm JavaScript để tạo tương tác.</li>
        </ul>

        <button onclick="alert('Chào bạn!')">Nhấn vào đây nè</button>
    </div>

</body>
</html>
