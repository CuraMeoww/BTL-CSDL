<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Cửa Hàng - SQL Cloud</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { padding: 25px; text-align: center; background: #1a252f; margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: #34495e; border-left: 5px solid var(--accent); }

        /* Main Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #2c3e50; font-size: 1.5em; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }

        /* Form Nhập liệu */
        .form-container { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        /* Nút bấm */
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--success); }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 12px; }
        .btn:hover { opacity: 0.8; }

        /* Bảng */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-size: 14px; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #555; }
        tr:hover { background: #fdfdfd; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Quản Lý Cửa Hàng</h2>
    <div class="nav-item active" id="btn-sp" onclick="switchTab('sp')">Sản Phẩm</div>
    <div class="nav-item" id="btn-nv" onclick="switchTab('nv')">Nhân Viên</div>
    <div class="nav-item" id="btn-kh" onclick="switchTab('kh')">Khách Hàng</div>
    <div class="nav-item" id="btn-hd" onclick="switchTab('hd')">Hóa Đơn</div>
</div>

<div class="content">
    <div class="card">
        <h1 id="tab-title">Quản lý Sản Phẩm</h1>
        <div class="form-container" id="dynamic-form">
            <div class="input-grid" id="input-fields"></div>
            <button class="btn btn-add" id="main-add-btn" onclick="handleAddItem()">Thêm Mới</button>
        </div>
        <table id="main-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = "https://super-duper-goggles-r4jw6xxgj7952pp56-5000.app.github.dev";
    let appData = { sp: [], nv: [], kh: [], hd: [] };
    let currentTab = 'sp';

    async function fetchData() {
        try {
            const response = await fetch(`${API_URL}/api/${currentTab}`);
            if (!response.ok) throw new Error("Lỗi fetch");
            const data = await response.json();
            
            if (currentTab === 'sp') {
                appData.sp = data.map(i => ({ id: i.MaSP, name: i.TenSP, type: i.LoaiSP, buy: i.GiaNhap, sell: i.GiaBan, stock: i.SoLuongTon }));
            } else if (currentTab === 'nv') {
                appData.nv = data.map(i => ({ id: i.MaNV, name: i.TenNV, phone: i.SDTNV, role: i.ChucVu, email: i.eMail }));
            } else if (currentTab === 'kh') {
                appData.kh = data.map(i => ({ id: i.MaKH, name: i.TenKH, phone: i.SDTKH, address: i.DiaChi, gender: i.GioiTinh }));
            } else if (currentTab === 'hd') {
                appData.hd = data.map(i => {
                    // Tự động tìm cột Ngày và cột Tiền dựa trên từ khóa trong SQL của bạn
                    let keyNgay = Object.keys(i).find(k => k.toLowerCase().includes('ngay')) || "NgayLap";
                    let keyTien = Object.keys(i).find(k => k.toLowerCase().includes('tien') || k.toLowerCase().includes('gia')) || "TongTien";

                    return { 
                        id: i.MaHD || i.mahd || "N/A", 
                        date: i[keyNgay] ? i[keyNgay].toString().slice(0, 10) : "N/A", 
                        total: i[keyTien] !== undefined ? i[keyTien] : 0, 
                        staff: i.MaNV || i.manv || "", 
                        customer: i.MaKH || i.makh || "" 
                    };
                });
            }
            renderTable();
        } catch (error) {
            console.error(error);
            document.getElementById('table-body').innerHTML = `<tr><td colspan="10" style="color:red; text-align:center">Lỗi kết nối Server!</td></tr>`;
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        const titles = {sp: "Sản Phẩm", nv: "Nhân Viên", kh: "Khách Hàng", hd: "Hóa Đơn"};
        document.getElementById('tab-title').innerText = "Quản lý " + titles[tab];
        renderForm();
        fetchData();
    }

    function renderForm() {
        const grid = document.getElementById('input-fields');
        if (currentTab === 'sp') {
            grid.innerHTML = `
                <input id="i1" placeholder="Mã SP"> <input id="i2" placeholder="Tên SP">
                <input id="i3" placeholder="Loại"> <input id="i4" type="number" placeholder="Giá Nhập">
                <input id="i5" type="number" placeholder="Giá Bán"> <input id="i6" type="number" placeholder="Tồn">`;
        } else if (currentTab === 'nv') {
            grid.innerHTML = `
                <input id="i1" placeholder="Mã NV"> <input id="i2" placeholder="Họ Tên">
                <input id="i3" placeholder="SĐT"> <input id="i4" placeholder="Chức vụ">
                <input id="i5" placeholder="Email">`;
        } else if (currentTab === 'kh') {
            grid.innerHTML = `
                <input id="i1" placeholder="Mã KH"> <input id="i2" placeholder="Họ Tên">
                <input id="i3" placeholder="SĐT"> <input id="i4" placeholder="Địa chỉ">
                <input id="i5" placeholder="Giới tính">`;
        } else if (currentTab === 'hd') {
            grid.innerHTML = `
                <input id="i1" placeholder="Mã HD"> <input id="i2" type="date">
                <input id="i3" type="number" placeholder="Tổng tiền"> <input id="i4" placeholder="Mã NV">
                <input id="i5" placeholder="Mã KH">`;
        }
    }

    function renderTable() {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        let headers = [];
        
        if (currentTab === 'sp') headers = ["Mã SP", "Tên SP", "Loại", "Giá Nhập", "Giá Bán", "Tồn", "Thao tác"];
        else if (currentTab === 'nv') headers = ["Mã NV", "Họ Tên", "SĐT", "Chức vụ", "Email", "Thao tác"];
        else if (currentTab === 'kh') headers = ["Mã KH", "Họ Tên", "SĐT", "Địa chỉ", "Giới tính", "Thao tác"];
        else if (currentTab === 'hd') headers = ["Mã HD", "Ngày lập", "Tổng tiền", "Mã NV", "Mã KH", "Thao tác"];
        
        head.innerHTML = `<tr>${headers.map(t => `<th>${t}</th>`).join('')}</tr>`;
        
        if (appData[currentTab].length === 0) {
            body.innerHTML = `<tr><td colspan="${headers.length}" style="text-align:center; padding:20px;">Không có dữ liệu.</td></tr>`;
            return;
        }

        body.innerHTML = appData[currentTab].map(item => `
            <tr>
                ${Object.entries(item).map(([key, v]) => {
                    // FIX LỖI SỐ 0: Hiển thị 0 nếu giá trị là 0, còn rỗng/null thì hiện trống
                    let displayValue = (v !== undefined && v !== null && v !== "") ? v : (v === 0 ? "0" : "");
                    
                    if (key === 'total' && typeof v === 'number') {
                        return `<td>${v.toLocaleString()} VNĐ</td>`;
                    }
                    return `<td>${displayValue}</td>`;
                }).join('')}
                <td><button class="btn btn-del" onclick="handleDeleteItem('${item.id}')">Xóa</button></td>
            </tr>`).join('');
    }

    async function handleAddItem() {
        const vals = [1,2,3,4,5,6].map(n => document.getElementById(`i${n}`)?.value);
        let payload = {};
        
        if (currentTab === 'sp') payload = { MaSP: vals[0], TenSP: vals[1], LoaiSP: vals[2], GiaNhap: Number(vals[3]), GiaBan: Number(vals[4]), SoLuongTon: Number(vals[5]) };
        else if (currentTab === 'nv') payload = { MaNV: vals[0], TenNV: vals[1], SDTNV: vals[2], ChucVu: vals[3], eMail: vals[4] };
        else if (currentTab === 'kh') payload = { MaKH: vals[0], TenKH: vals[1], SDTKH: vals[2], DiaChi: vals[3], GioiTinh: vals[4] };
        else if (currentTab === 'hd') payload = { MaHD: vals[0], NgayLap: vals[1], TongTien: Number(vals[2]), MaNV: vals[3], MaKH: vals[4] };

        await fetch(`${API_URL}/api/${currentTab}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        fetchData();
        document.querySelectorAll('input').forEach(i => i.value = "");
    }

    async function handleDeleteItem(id) {
        if (confirm("Xác nhận xóa khỏi hệ thống?")) {
            await fetch(`${API_URL}/api/${currentTab}/${id}`, { method: 'DELETE' });
            fetchData();
        }
    }

    window.onload = () => switchTab('sp');
</script>
</body>
</html>
